{% extends "base.html" %}
{% block extrahead %}
  {{ super() }}
  {% if page.meta and page.meta.modified %}
    <meta name="modified" content="{{ page.meta.modified }}">
  {% endif %}
  <style>
    .md-path__list > .md-path__item:first-child { display: none; }
    .md-path__list > .md-path__item:nth-child(2)::before { content: none; }

    /* Hide the primary navigation sidebar on desktop only; keep it for mobile drawer */
    @media screen and (min-width: 76.25em) {
      .md-sidebar--primary { display: none; }
    }
  </style>
{% endblock %}
{% block content %}
  {{ super() }}
  {% if page and page.title %}
    <script>
      (function() {
        const list = document.querySelector(".md-path__list");
        if (!list) return;
        const title = {{ page.title | tojson }};
        if (list.lastElementChild?.textContent.trim() === title) return;
        const li = document.createElement("li");
        li.className = "md-path__item";
        li.textContent = title;
        list.appendChild(li);
      })();
    </script>
  {% endif %}
{% endblock %}
